<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="assets/css/style.css"> <!-- CSS Principal -->
    <link rel="stylesheet" href="assets/css/media.css"> <!-- CSS Media Query -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" /> <!-- Link icons -->
</head>

<body>
    <section> <!-- Container -->
        
        <!-- Lado esquerdo -->
        <div>
            <!-- Box com textos superiores -->
            <div class="txt">
                <h1>Faça login</h1>
                <p>Entre para acessar sua conta.</p>
            </div>

            <!-- Formulário -->
            <form class="form">
                <label for="email" class="label">E-mail</label>
                <div class="box-input">
                    <span class="material-symbols-outlined" id="email">mail</span>
                    <input type="email" name="email" class="input" placeholder="E-mail" required>
                </div>
                <label for="senha" class="label">Senha</label>
                <div class="box-input">
                    <span class="material-symbols-outlined" id="senha">lock</span>
                    <input type="password" name="senha" class="input" placeholder="Senha" required>
                </div>
                <a href="dashboard.html" class="botao">ENTRAR</a>
            </form>

        </div>

        <!-- Lado direito -->
        <img src="assets/img/Learning.png" alt="Learning" id="img">

    </section>

    <script src="assets/js/index.js"></script>
</body>

</html>
